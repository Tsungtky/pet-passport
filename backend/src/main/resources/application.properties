spring.application.name=backend

# PostgreSQL (reads from environment variables, falls back to local)
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:petpassport}
spring.datasource.username=${PGUSER:nicktraining}
spring.datasource.password=${PGPASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
