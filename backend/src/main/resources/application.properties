spring.application.name=backend

# PostgreSQL (reads from environment variables, falls back to local)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/petpassport}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nicktraining}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
